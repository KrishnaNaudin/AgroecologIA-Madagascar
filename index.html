<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Évaluation AgroecologIA — test à blanc</title>
<style>
:root{--dark:#06292B;--green:#0CA536;--lime:#94C11E;--dgreen:#005E29;--magenta:#E41B8F;--bg:#f4f6f5;--card:#fff;--border:#d9e0dd;--txt:#1c2b29;--muted:#5b6b67}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--txt);line-height:1.45}
header{position:sticky;top:0;z-index:10;background:var(--dark);color:#fff;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
header .t{font-weight:600;font-size:15px}header .b{font-size:12px;background:var(--magenta);padding:3px 8px;border-radius:20px}
main{max-width:860px;margin:0 auto;padding:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin:16px 0;box-shadow:0 1px 3px rgba(0,0,0,.05)}
h1{font-size:20px;margin:.2em 0}h2{font-size:17px;color:var(--dgreen);margin:.1em 0 .5em;border-left:4px solid var(--lime);padding-left:10px}
.step{font-weight:700;color:var(--dark);background:var(--lime);display:inline-block;padding:2px 10px;border-radius:6px;margin:.4em 0;font-size:13px}
h3{font-size:15px;margin:1em 0 .3em}.sub{font-weight:700;color:var(--dgreen);margin-top:1.1em}.muted{color:var(--muted);font-size:12.5px}
.prog{font-size:12px;color:var(--muted);margin:.3em 0}
.qbox{padding:14px;background:#eef5ef;border:1px solid var(--border);border-radius:10px;font-size:15px;font-weight:600}
.field{margin:.55em 0;font-size:14px;display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.field label{font-weight:600}.field input[type=text]{border:none;border-bottom:1px dotted #888;min-width:120px;font:inherit;flex:1}
.opts{display:flex;gap:6px;flex-wrap:wrap}.opt{border:1px solid var(--border);border-radius:8px;padding:6px 11px;cursor:pointer;font-size:13px;background:#fff}
.opt.on{background:var(--lime);border-color:var(--dgreen);color:var(--dark);font-weight:700}
.know .opt{flex:1;min-width:90px;text-align:center}
table.nug{width:100%;border-collapse:collapse;margin-top:6px;font-size:13px}.nug th,.nug td{border:1px solid var(--border);padding:5px;text-align:center}
.nug td.tx{text-align:left}.nug td.idc{font-weight:700;color:var(--dgreen)}.nug th{background:#eef2f0;font-size:12px}
.chip{display:inline-block;width:26px;height:26px;border-radius:50%;border:2px solid #bcc7c3;cursor:pointer;vertical-align:middle}
.chip.on{background:var(--green);border-color:var(--dgreen)}.chip[data-v="R"].on{background:#c23b3b;border-color:#8f2a2a}
.chip.wide{width:auto;height:auto;border-radius:8px;padding:7px 10px;font-size:13px;font-weight:700;color:var(--txt)}.chip.wide.on{color:#fff}
.resp{border:1px solid var(--border);border-radius:10px;margin:10px 0;overflow:hidden}
.resp .lab{display:flex;justify-content:space-between;align-items:center;font-weight:700;color:#fff;background:var(--green);padding:8px 14px}.resp.B .lab{background:var(--dgreen)}.resp .lab .qr{font-size:11px;font-weight:400;opacity:.85}
.resp .scroll{max-height:340px;overflow:auto;padding:14px;font-size:13.5px;background:#fbfcfb}
.resp .scroll h5{color:var(--dgreen);margin:.7em 0 .2em;font-size:14px}.resp .scroll p{margin:.35em 0}.resp .scroll ul{margin:.2em 0 .2em 1.1em}.resp .scroll hr{border:none;border-top:1px dashed var(--border)}
.qual{margin:6px 0}.qual .c{font-weight:700;font-size:14px}.qual .d{font-size:12.5px;color:var(--muted);margin-bottom:3px}.scale{display:flex;gap:6px}.scale .opt{flex:1;text-align:center;min-width:0}
.btn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:12px 20px;font-size:15px;font-weight:600;cursor:pointer}.btn.sec{background:#fff;color:var(--dgreen);border:1px solid var(--dgreen)}
.nav{display:flex;justify-content:space-between;gap:10px;margin:18px 0}.footer-rem{position:sticky;bottom:0;background:#eef2f0;border-top:1px solid var(--border);font-size:12px;color:var(--muted);text-align:center;padding:6px}
.nug-mobile{display:none}pre{background:var(--dark);color:#cdeccf;padding:12px;border-radius:8px;overflow:auto;font-size:12px}
.evgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-top:12px}
.evgrid a{display:block;text-align:center;text-decoration:none;background:var(--green);color:#fff;font-weight:700;padding:16px;border-radius:10px}
@media(max-width:600px){table.nug{display:none}.nug-mobile{display:block}.nm{border:1px solid var(--border);border-radius:8px;padding:10px;margin:8px 0;background:#fff}.nm .tx{font-size:13.5px;margin-bottom:8px}.nm .row{display:flex;gap:6px;flex-wrap:wrap}.nm .row .chip{flex:1;min-width:64px;text-align:center}}
</style></head><body>
<header><span class="t" id="htitle">Fiche d'évaluation · CRESI AgroecologIA</span><span class="b" id="evtag"></span></header>
<main id="app"></main>
<div class="footer-rem" id="rem"></div>

<script src="config.js"></script>
<script src="content.js"></script>
<script src="plan.js"></script>
<script>
var CFG=window.CONFIG, C=window.CONTENT, PLAN=window.PLAN;
var CRIT=[["Pertinence","La réponse traite-t-elle bien du sujet ?"],
 ["Clarté","La réponse est-elle facile à comprendre ?"],
 ["Actionnabilité","Peut-on appliquer ces conseils au champ ?"],
 ["Confiance","Feriez-vous confiance pour conseiller un agriculteur ?"],
 ["Longueur","La longueur est-elle adaptée ?  (1 = trop courte · 3 = adaptée · 5 = trop longue)"]];
var COLS=[["V","Vital"],["U","Utile"],["O","Option."],["R","À retirer"]];
document.getElementById('htitle').textContent="Fiche d'évaluation · "+(CFG.TITRE||"AgroecologIA");

var params=new URLSearchParams(location.search);
var EV=params.get('ev'); if(EV){EV=EV.replace(/[^0-9]/g,''); if(EV.length===1)EV='0'+EV;}
var app=document.getElementById('app'), rem=document.getElementById('rem'), evtag=document.getElementById('evtag');
var store={}, LSKEY="", step=0, QS=[];

function save(){localStorage.setItem(LSKEY,JSON.stringify(store))}
window.ta=function(el){store[el.dataset.k]=el.value;save()};
window.opt=function(el){store[el.dataset.g]=el.dataset.v;el.parentNode.querySelectorAll('.opt').forEach(function(o){o.classList.toggle('on',o===el)});save()};
window.pick=function(el){var g=el.dataset.g,v=el.dataset.v;store[g]=v;document.querySelectorAll('[data-g="'+g+'"]').forEach(function(c){c.classList.toggle('on',c.dataset.v===v)});save()};
function txt(k,ph){var v=store[k]?(' value="'+String(store[k]).replace(/"/g,'&quot;')+'"'):'';return '<input type="text" data-k="'+k+'" oninput="ta(this)" placeholder="'+(ph||'')+'"'+v+'>'}
function optset(group,vals,extra){return '<span class="opts '+(extra||'')+'">'+vals.map(function(v){return '<span class="opt'+(store[group]===v?' on':'')+'" data-g="'+group+'" data-v="'+v+'" onclick="opt(this)">'+v+'</span>'}).join('')+'</span>'}
function scale(group){return '<div class="scale">'+[1,2,3,4,5].map(function(v){return '<span class="opt'+(store[group]==v?' on':'')+'" data-g="'+group+'" data-v="'+v+'" onclick="opt(this)">'+v+'</span>'}).join('')+'</div>'}

function landing(){
 evtag.textContent=""; rem.textContent="";
 var btns="";for(var i=1;i<=10;i++){var n=(i<10?'0':'')+i;btns+='<a href="?ev='+n+'">Évaluateur '+n+'</a>';}
 app.innerHTML='<div class="card"><h1>Atelier d\'évaluation — '+(CFG.TITRE||'')+'</h1>'
  +'<p>Sélectionnez votre numéro d\'évaluateur (ou scannez le QR code qui vous a été remis).</p>'
  +'<div class="evgrid">'+btns+'</div></div>';
}

function setHeadFoot(){ evtag.textContent="Évaluateur "+EV; rem.textContent="Évaluateur "+EV+(step>=1&&step<=QS.length?" · "+QS[step-1].qid:"")+" · "+CFG.ATELIER; }

function profil(){
 app.innerHTML='<div class="card"><h1>Fiche d\'évaluation — Évaluateur n° '+EV+'</h1>'
 +'<p class="muted">CRESI AgroecologIA — Méthodologie nuggets · 2 assistants IA comparés (A / B) · '+QS.length+' questions</p>'
 +'<h3>■ Profil évaluateur</h3>'
 +'<div class="field"><label>Code évaluateur :</label>'+txt('p_code')+'</div>'
 +'<div class="field"><label>Sexe :</label>'+optset('p_sexe',["H","F"])+'<label>Date :</label>'+txt('p_date')+'<label>Lieu :</label>'+txt('p_lieu')+'</div>'
 +'<div class="field"><label>Structure / Organisation :</label>'+txt('p_struct')+'</div>'
 +'<div class="field"><label>Spécialité :</label>'+txt('p_spe')+'</div>'
 +'<div class="field"><label>Expérience métier :</label>'+optset('p_exp',["0 (aucune)","1 (1-5 ans)","2 (>5 ans)"])+'</div>'
 +'<div class="field"><label>Niveau de diplôme :</label>'+optset('p_dip',["Primaire","Secondaire","BTS/DUT","Licence","Master/Ing.","Doctorat"])+'</div>'
 +'<div class="field"><label>Familiarité IA :</label>'+optset('p_fam',["Jamais utilisé","Déjà essayé","Utilise régulièrement","Au privé uniquement"])+'</div>'
 +'<div class="field"><label>Si déjà utilisé l\'IA générative — Agent :</label>'+optset('p_agent',["ChatGPT","Gemini","MetaAI","Autre"])+txt('p_agent_autre','autre...')+'</div>'
 +'<div class="field"><label>Confiance IAG :</label>'+optset('p_conf',["En général oui","Tendance non","Ça dépend"])+'<label>Raison :</label>'+txt('p_conf_raison')+'</div>'
 +'<p class="muted">Consigne : pour chaque question, indiquez d\'abord votre connaissance du sujet, complétez la grille des nuggets et vos ajouts libres, <b>puis</b> lisez les deux réponses (A et B).</p>'
 +'<div class="nav"><span></span><button class="btn" onclick="go('+1+')">Commencer →</button></div></div>';
 window.scrollTo(0,0);
}

function question(qi){
 var Q=QS[qi-1], qid=Q.qid, ct=C[qid];
 var respA=ct.resp[Q.A], respB=ct.resp[Q.B];
 var know='know_'+qid;
 var rows=ct.nuggets.map(function(n){return '<tr><td class="idc">'+n.id+'</td><td class="tx">'+n.t+'</td>'
   +COLS.map(function(c){var g='nug_'+qid+'_'+n.id;return '<td><span class="chip'+(store[g]===c[0]?' on':'')+'" data-g="'+g+'" data-v="'+c[0]+'" onclick="pick(this)"></span></td>'}).join('')+'</tr>'}).join('');
 var mob=ct.nuggets.map(function(n){return '<div class="nm"><div class="tx"><b>'+n.id+'</b> — '+n.t+'</div><div class="row">'
   +COLS.map(function(c){var g='nug_'+qid+'_'+n.id;return '<span class="chip wide'+(store[g]===c[0]?' on':'')+'" data-g="'+g+'" data-v="'+c[0]+'" onclick="pick(this)">'+c[1]+'</span>'}).join('')+'</div></div>'}).join('');
 var adds='<table class="nug"><thead><tr><th>#</th><th class="tx">Information (ajout libre)</th><th>Vital</th><th>Utile</th><th>Option.</th><th>À retirer</th></tr></thead><tbody>';
 for(var i=1;i<=5;i++){adds+='<tr><td class="idc">'+i+'</td><td class="tx">'+txt('add'+i+'_'+qid+'_txt','information importante absente des nuggets...')+'</td>'
   +COLS.map(function(c){var g='add'+i+'_'+qid;return '<td><span class="chip'+(store[g]===c[0]?' on':'')+'" data-g="'+g+'" data-v="'+c[0]+'" onclick="pick(this)"></span></td>'}).join('')+'</tr>';}
 adds+='</tbody></table><div class="nug-mobile">';
 for(var j=1;j<=5;j++){adds+='<div class="nm"><div class="tx"><b>'+j+'.</b> '+txt('add'+j+'_'+qid+'_txt','information importante absente...')+'</div><div class="row">'
   +COLS.map(function(c){var g='add'+j+'_'+qid;return '<span class="chip wide'+(store[g]===c[0]?' on':'')+'" data-g="'+g+'" data-v="'+c[0]+'" onclick="pick(this)">'+c[1]+'</span>'}).join('')+'</div></div>';}
 adds+='</div>';
 function qual(ab){return CRIT.map(function(c){return '<div class="qual"><div class="c">'+c[0]+'</div><div class="d">'+c[1]+'</div>'+scale('qual'+ab+'_'+qid+'_'+c[0])+'</div>'}).join('')}

 app.innerHTML='<div class="card"><div class="prog">Question '+qi+' / '+QS.length+'</div><h2>Question '+qi+'</h2><div class="qbox">'+ct.enonce+'</div>'
 +'<div class="sub">Votre connaissance de CE sujet <span class="muted">(une seule case)</span></div>'+optset(know,["Pas mon domaine","Quelques notions","Bonne maîtrise","Expert / référent"],"know")+'</div>'
 +'<div class="card"><span class="step">Étape 1 — Grille des nuggets</span><p class="muted">Cochez <b>une seule case par ligne</b> : Vital · Utile · Optionnel · À retirer (redondant / hors-sujet / faux).</p>'
 +'<table class="nug"><thead><tr><th>ID</th><th class="tx">Information (nugget)</th><th>Vital</th><th>Utile</th><th>Option.</th><th>À retirer</th></tr></thead><tbody>'+rows+'</tbody></table><div class="nug-mobile">'+mob+'</div>'
 +'<div class="sub">■ Ajouts libres — informations importantes absentes des nuggets</div><p class="muted">Pour chaque ajout, cochez une case : Vital · Utile · Optionnel · À retirer.</p>'+adds+'</div>'
 +'<div class="card"><span class="step">Étape 2 — Lecture des deux réponses IA (A et B, ordre tiré au sort)</span>'
 +'<div class="resp A"><div class="lab"><span>RÉPONSE A</span><span class="qr">▦ traçabilité</span></div><div class="scroll">'+respA+'</div></div>'
 +'<div class="sub">Évaluation de la qualité — Réponse A <span class="muted">(1 = très mauvais → 5 = excellent)</span></div>'+qual('A')
 +'<div class="resp B"><div class="lab"><span>RÉPONSE B</span><span class="qr">▦ traçabilité</span></div><div class="scroll">'+respB+'</div></div>'
 +'<div class="sub">Évaluation de la qualité — Réponse B <span class="muted">(1 = très mauvais → 5 = excellent)</span></div>'+qual('B')+'</div>'
 +'<div class="nav"><button class="btn sec" onclick="go('+(qi-1)+')">← Précédent</button><button class="btn" onclick="tryNext('+qi+')">'+(qi===QS.length?'Aller à l\'envoi →':'Question suivante →')+'</button></div>';
 window.scrollTo(0,0);
}

function checkQ(qid){var p=[];var nm=0;C[qid].nuggets.forEach(function(n){if(!store['nug_'+qid+'_'+n.id])nm++});if(nm)p.push(nm+' nugget(s)');
 var qm=0;CRIT.forEach(function(c){if(!store['qualA_'+qid+'_'+c[0]])qm++;if(!store['qualB_'+qid+'_'+c[0]])qm++});if(qm)p.push(qm+' critère(s) qualité');
 if(!store['know_'+qid])p.push('la connaissance du sujet');return p;}
function rmWarn(){var w=document.getElementById('warn');if(w)w.remove();}
function showWarn(parts,onCont){rmWarn();var d=document.createElement('div');d.id='warn';
 d.style.cssText='position:fixed;left:0;right:0;bottom:0;background:#fff3cd;border-top:2px solid var(--magenta);padding:12px 16px;z-index:50;box-shadow:0 -2px 10px rgba(0,0,0,.15)';
 d.innerHTML='<div style="max-width:860px;margin:0 auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap"><span style="flex:1;font-size:14px">⚠️ Non renseigné : '+parts.join(' · ')+'. Vous pouvez compléter ou continuer (vides = « pas d\'avis »).</span><button class="btn sec" id="wc">Compléter</button><button class="btn" id="wo">Continuer →</button></div>';
 document.body.appendChild(d);
 document.getElementById('wc').onclick=rmWarn;
 document.getElementById('wo').onclick=function(){rmWarn();onCont();};
}
window.tryNext=function(qi){var p=checkQ(QS[qi-1].qid);if(p.length){showWarn(p,function(){go(qi+1)});}else go(qi+1);};
window.go=function(s){rmWarn();step=s;render();};

function submitScreen(){
 app.innerHTML='<div class="card"><h1>Dernière étape — envoi</h1>'
 +'<p>Merci ! Vérifiez que vous avez bien répondu aux '+QS.length+' questions, puis envoyez vos réponses.</p>'
 +'<p class="muted">Évaluateur '+EV+' · questions : '+QS.map(function(q){return q.qid}).join(', ')+'</p>'
 +'<div id="sendmsg"></div>'
 +'<div class="nav"><button class="btn sec" onclick="go('+QS.length+')">← Revenir</button><button class="btn" id="sendbtn" onclick="sendData()">Envoyer mes réponses ✓</button></div></div>';
 window.scrollTo(0,0);
}
function buildPayload(){
 var prof={};["p_code","p_sexe","p_date","p_lieu","p_struct","p_spe","p_exp","p_dip","p_fam","p_agent","p_agent_autre","p_conf","p_conf_raison"].forEach(function(k){prof[k]=store[k]||""});
 var qs=QS.map(function(Q){var qid=Q.qid;var nug={};C[qid].nuggets.forEach(function(n){nug[n.id]=store['nug_'+qid+'_'+n.id]||""});
   var adds=[];for(var i=1;i<=5;i++){if(store['add'+i+'_'+qid+'_txt'])adds.push({texte:store['add'+i+'_'+qid+'_txt'],niveau:store['add'+i+'_'+qid]||''})}
   var qA={},qB={};CRIT.forEach(function(c){qA[c[0]]=store['qualA_'+qid+'_'+c[0]]||'';qB[c[0]]=store['qualB_'+qid+'_'+c[0]]||''});
   return {qid:qid,connaissance:store['know_'+qid]||"",nuggets:nug,ajouts_libres:adds,
           qualite_A:qA,systeme_A:Q.A,qualite_B:qB,systeme_B:Q.B};});
 return {atelier:CFG.ATELIER,evaluateur:EV,horodatage:new Date().toISOString(),profil:prof,questions:qs};
}
window.sendData=function(){
 var payload=buildPayload();
 var msg=document.getElementById('sendmsg'), btn=document.getElementById('sendbtn');
 if(!CFG.ENDPOINT){msg.innerHTML='<pre>'+JSON.stringify(payload,null,2).replace(/</g,'&lt;')+'</pre><p class="muted">(Aucun ENDPOINT configuré : aperçu de ce qui serait envoyé.)</p>';return;}
 btn.disabled=true; msg.innerHTML='<p>Envoi en cours…</p>';
 fetch(CFG.ENDPOINT,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)})
  .then(function(){localStorage.removeItem(LSKEY);app.innerHTML='<div class="card"><h1>Merci, c\'est envoyé ✅</h1><p>Vous pouvez fermer la page.</p></div>';})
  .catch(function(){btn.disabled=false;msg.innerHTML='<p style="color:#c23b3b">Échec de l\'envoi. Vérifiez la connexion et réessayez.</p>';});
}

function render(){
 if(step===0) profil();
 else if(step>=1&&step<=QS.length) question(step);
 else submitScreen();
 setHeadFoot();
}
function start(){
 if(!EV||!PLAN[EV]){landing();return;}
 LSKEY="tb_"+CFG.ATELIER+"_"+EV; try{store=JSON.parse(localStorage.getItem(LSKEY)||"{}")}catch(e){store={}}
 QS=PLAN[EV].questions; step=0; render();
}
start();
</script></body></html>

<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>QR codes évaluateurs — Maraîchage Occitanie</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>body{font-family:system-ui,Segoe UI,Arial,sans-serif;margin:24px;color:#06292B}
h1{font-size:20px}.b{display:flex;gap:8px;align-items:center;margin:10px 0}
input{flex:1;padding:8px;border:1px solid #cbd5d0;border-radius:6px;font:inherit}button{padding:8px 14px;border:0;background:#0CA536;color:#fff;border-radius:6px;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-top:16px}
.card{border:1px solid #d9e0dd;border-radius:10px;padding:14px;text-align:center}.card h3{margin:.2em 0;color:#005E29}
.card .lnk{font-size:11px;word-break:break-all;color:#5b6b67}@media print{button,.b{display:none}}</style></head><body>
<h1>QR codes — Évaluateurs (Maraîchage Occitanie)</h1>
<div class="b"><label>URL de base du site déployé :</label>
<input id="base" value="https://krishnanaudin.github.io/AgroecologIA-Madagascar/maraichage-occitanie/">
<button onclick="gen()">Générer</button><button onclick="window.print()">Imprimer</button></div>
<div class="grid" id="grid"></div>
<script>
function gen(){var base=document.getElementById('base').value.replace(/\/+$/,'/');if(!base.endsWith('/'))base+='/';
 var g=document.getElementById('grid');g.innerHTML='';
 for(var i=1;i<=10;i++){var n=(i<10?'0':'')+i;var url=base+'?ev='+n;
  var c=document.createElement('div');c.className='card';c.innerHTML='<h3>Évaluateur '+n+'</h3><div id="q'+n+'"></div><div class="lnk">'+url+'</div>';
  g.appendChild(c);new QRCode(document.getElementById('q'+n),{text:url,width:150,height:150});}}
gen();
</script></body></html>
